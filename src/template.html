<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
    </head>
    <body>
        <div id="content">
            <div id="container">
                <p id="whetherStatus">Clear Skies</p>
                <h1 id="location">Boston</h1>
                <div>
                    <p id="temperature">
                        32
                        <sup>°F</sup>
                    </p>
                    <div id="line"></div>
                    <div id="right-section">
                        <p id="feelsLike">Feesl like: 40°F</p>
                        <p id="humidity">Humidity: 17°F</p>
                        <p id="windspeed">Windspeed: 3.1</p>
                    </div>
                </div>
            </div>
        </div>
        <form id="searchForm">
            <input type="text" id="weatherSearch" placeholder="Search a city" />
            <button>Search</button>
            <span id="error"></span>
            <span id="loading"></span>
        </form>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Iceland&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="content">
            <div id="container">
                <p id="whetherStatus"></p>
                <h1 id="location"></h1>
                <div>
                    <p id="temperature">
                        32
                        <sup>°F</sup>
                    </p>
                    <div id="line"></div>
                    <div id="right-section">
                        <p id="feelsLike"></p>
                        <p id="humidity"></p>
                        <p id="windspeed"></p>
                    </div>
                </div>
            </div>
        </div>
        <form id="searchForm">
            <input type="text" id="weatherSearch" placeholder="Search a city" />
            <button>Search</button>
            <span id="error"></span>
            <span id="loading"></span>
        </form>
    </body>
</html>
